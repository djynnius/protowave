document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

55f9b8-42aa-48e6-be4b-d694149601e6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"fc8eabf0-1360-4c61-9b2d-bf1747faf7fc\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b146e4e4-f9c1-4acf-a683-85002baf5a3c\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"e896799a-d1df-4e01-8584-182561a3a243\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"bf0442db-0a65-422f-97a1-eb83ad252a20\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4ba82955-cc65-4aaa-b328-1bbc3582359e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"3755f9b8-42aa-48e6-be4b-d694149601e6\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fc8eabf0-1360-4c61-9b2d-bf1747faf7fc\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{background:#F6F9FD;color:#0B1B2B;font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  ::selection{background:#cfe3ff}\n  input::placeholder{color:#a9b7c8}\n  input{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"width:1240px;min-height:840px;display:flex;flex-direction:column;align-items:center;padding:36px;background:radial-gradient(130% 80% at 50% -10%, #DCEAFB 0%, #F6F9FD 55%)\">\n\n  <!-- brand + progress -->\n  <div style=\"width:100%;max-width:1000px;display:flex;align-items:center;justify-content:space-between;margin-bottom:34px\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <div style=\"width:30px;height:30px\">{{ navMark }}<\u002Fdiv>\n      <span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:19px;letter-spacing:-0.02em\">Proto<span style=\"color:#2E6BF0\">Wave<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:9px\">\n          <span style=\"width:26px;height:26px;border-radius:50%;background:{{ s.bg }};color:{{ s.fg }};border:1.5px solid {{ s.border }};font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center\">{{ s.num }}<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:{{ s.labelFg }}\">{{ s.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- card -->\n  <div style=\"width:100%;max-width:1000px;background:#fff;border:1px solid #EAF0F7;border-radius:26px;box-shadow:0 40px 90px -50px rgba(20,50,90,0.4);overflow:hidden;display:grid;grid-template-columns:1.15fr 0.85fr\">\n\n    <!-- LEFT: step content -->\n    <div style=\"padding:44px 46px;min-height:470px;display:flex;flex-direction:column\">\n\n      <sc-if value=\"{{ isStep0 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:0.13em;text-transform:uppercase;color:#2E6BF0;margin-bottom:12px\">Step 1 · Name it<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:36px;letter-spacing:-0.03em;line-height:1.02;margin:0 0 10px\">Create your first wave<\u002Fh1>\n          <p style=\"font-size:16px;line-height:1.55;color:#7688a0;margin:0 0 28px\">A wave is a conversation that's also a living document. Give it a name and a space.<\u002Fp>\n          <label style=\"display:block;font-size:13px;font-weight:600;color:#46586B;margin-bottom:7px\">Wave title<\u002Flabel>\n          <input type=\"text\" value=\"{{ waveName }}\" oninput=\"{{ onName }}\" placeholder=\"e.g. Beta launch plan\" style=\"width:100%;background:#F6F9FD;border:1px solid #E2E9F0;border-radius:12px;padding:14px 16px;font-size:16px;color:#0B1B2B;outline:none;margin-bottom:22px\" style-focus=\"border-color:#2E6BF0;box-shadow:0 0 0 3px rgba(46,107,240,0.14);background:#fff\">\n          <label style=\"display:block;font-size:13px;font-weight:600;color:#46586B;margin-bottom:9px\">Space<\u002Flabel>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px\">\n            <sc-for list=\"{{ spaceOptions }}\" as=\"sp\" hint-placeholder-count=\"5\">\n              <span onclick=\"{{ sp.select }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:{{ sp.fg }};background:{{ sp.bg }};border:1px solid {{ sp.border }};padding:8px 14px;border-radius:100px;cursor:pointer\">\n                <span style=\"width:8px;height:8px;border-radius:3px;background:{{ sp.dot }}\"><\u002Fspan>{{ sp.name }}\n              <\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isStep1 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:0.13em;text-transform:uppercase;color:#2E6BF0;margin-bottom:12px\">Step 2 · Invite people<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:36px;letter-spacing:-0.03em;line-height:1.02;margin:0 0 10px\">Who's on this wave?<\u002Fh1>\n          <p style=\"font-size:16px;line-height:1.55;color:#7688a0;margin:0 0 24px\">Add anyone by their address — even <span style=\"font-family:'JetBrains Mono',monospace;font-size:14px;color:#46586B\">friend@another-server.dev<\u002Fspan>. Federation just works.<\u002Fp>\n          <input type=\"text\" onkeydown=\"{{ onAddKey }}\" placeholder=\"name@server.dev  ·  press Enter\" style=\"width:100%;background:#F6F9FD;border:1px solid #E2E9F0;border-radius:12px;padding:13px 16px;font-size:15px;color:#0B1B2B;outline:none;margin-bottom:20px\" style-focus=\"border-color:#2E6BF0;box-shadow:0 0 0 3px rgba(46,107,240,0.14);background:#fff\">\n          <div style=\"font-size:12.5px;font-weight:700;color:#a9b7c8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px\">Suggested<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ people }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ p.toggle }}\" style=\"display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:12px;border:1px solid {{ p.rowBorder }};background:{{ p.rowBg }};cursor:pointer\">\n                <div style=\"width:32px;height:32px;flex:none;border-radius:50%;background:{{ p.color }};color:{{ p.tc }};font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center\">{{ p.init }}<\u002Fdiv>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-size:14px;font-weight:600;color:#1B3145\">{{ p.name }}<\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#9aa8bb\">{{ p.addr }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"width:22px;height:22px;flex:none;border-radius:50%;background:{{ p.checkBg }};border:1.5px solid {{ p.checkBorder }};display:flex;align-items:center;justify-content:center\">{{ p.check }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isStep2 }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:12px;letter-spacing:0.13em;text-transform:uppercase;color:#2E6BF0;margin-bottom:12px\">Step 3 · Translation<\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:36px;letter-spacing:-0.03em;line-height:1.02;margin:0 0 10px\">Speak every language<\u002Fh1>\n          <p style=\"font-size:16px;line-height:1.55;color:#7688a0;margin:0 0 24px\">Turn on live translation and everyone reads this wave in their own language — as it's typed.<\u002Fp>\n          <div onclick=\"{{ toggleTranslate }}\" style=\"display:flex;align-items:center;gap:16px;background:{{ translateCardBg }};border:1.5px solid {{ translateCardBorder }};border-radius:16px;padding:18px 20px;cursor:pointer;margin-bottom:18px\">\n            <span style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:18px;color:#2E6BF0;flex:none\">↺<\u002Fspan>\n            <div style=\"flex:1\"><div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15.5px\">Live auto-translation<\u002Fdiv><div style=\"font-size:13px;color:#7688a0;margin-top:2px\">Recommended for multilingual waves<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:46px;height:26px;border-radius:100px;background:{{ toggleBg }};position:relative;flex:none\"><span style=\"position:absolute;top:2px;left:{{ toggleX }};width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(20,50,90,0.3)\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ translate }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:flex-start;gap:10px;background:#FFF8EC;border:1px solid #F5E4C3;border-radius:12px;padding:13px 15px\">\n              <span style=\"width:16px;height:16px;flex:none;border-radius:50%;background:#E7A43B;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px\">i<\u002Fspan>\n              <div style=\"font-size:13px;line-height:1.5;color:#8a6d3b\">To translate, message text is sent to a third-party model (<span style=\"font-weight:700\">Google Gemini<\u002Fspan>). It's off for everyone until enabled, and the original is always one toggle away.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isDone }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center\">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:#E6F7F4;display:flex;align-items:center;justify-content:center;margin-bottom:22px\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\"><polyline points=\"4,12.5 10,18 20,6\" fill=\"none\" stroke=\"#0f766e\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n          <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:38px;letter-spacing:-0.03em;line-height:1.0;margin:0 0 12px\">Your wave is ready.<\u002Fh1>\n          <p style=\"font-size:16px;line-height:1.55;color:#7688a0;margin:0 0 8px;max-width:360px\">Jump in and start collaborating — invite more people any time.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- nav buttons -->\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:28px;padding-top:24px;border-top:1px solid #F1F4F8\">\n        <span onclick=\"{{ back }}\" style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:14.5px;color:{{ backColor }};cursor:{{ backCursor }};padding:11px 4px\">← Back<\u002Fspan>\n        <span onclick=\"{{ next }}\" style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;color:#fff;background:{{ accent }};padding:13px 26px;border-radius:100px;cursor:pointer;box-shadow:0 10px 24px -10px rgba(46,107,240,0.6)\" style-hover=\"opacity:0.92\">{{ nextLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RIGHT: live preview -->\n    <div style=\"background:#0B1B2B;padding:38px 34px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;width:320px;height:320px;right:-120px;top:-90px;border-radius:50%;background:radial-gradient(circle,rgba(46,107,240,0.32),rgba(129,140,245,0.1) 55%,transparent 72%)\"><\u002Fdiv>\n      <div style=\"position:relative;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6b8199;margin-bottom:14px\">live preview<\u002Fdiv>\n      <div style=\"position:relative;background:#0F2437;border:1px solid #1e3a52;border-radius:18px;padding:20px\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\">\n          <span style=\"width:8px;height:8px;border-radius:3px;background:{{ previewDot }};flex:none\"><\u002Fspan>\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#7cc4ff\">{{ previewSpace }}<\u002Fspan>\n          <sc-if value=\"{{ translate }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:10px;font-weight:700;color:#5eead4;background:rgba(45,212,191,0.14);padding:2px 8px;border-radius:100px;margin-left:auto\">↺ translate<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:22px;letter-spacing:-0.02em;color:#fff;line-height:1.1;margin-bottom:16px;min-height:26px\">{{ previewTitle }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;margin-bottom:18px;min-height:32px\">\n          <sc-for list=\"{{ previewAvatars }}\" as=\"a\" hint-placeholder-count=\"1\">\n            <div style=\"width:30px;height:30px;border-radius:50%;background:{{ a.color }};color:{{ a.tc }};font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #0F2437;margin-left:{{ a.ml }}\">{{ a.init }}<\u002Fdiv>\n          <\u002Fsc-for>\n          <span style=\"font-size:12.5px;color:#8fb3d6;margin-left:12px\">{{ previewCount }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <div style=\"height:9px;border-radius:100px;background:#1e3a52\"><\u002Fdiv>\n          <div style=\"height:9px;width:82%;border-radius:100px;background:#1e3a52\"><\u002Fdiv>\n          <div style=\"height:9px;width:60%;border-radius:100px;background:#16304a\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;font-size:13px;line-height:1.5;color:#8fb3d6;margin-top:22px;text-align:center\">{{ previewCaption }}<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1240,&quot;height&quot;:840},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#2E6BF0&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Brand&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this._gid = 0;\n    this.geo = this.buildWave();\n    this.state = {\n      step: 0,\n      waveName: '',\n      space: 'launch-strategy',\n      translate: true,\n      added: {},\n    };\n    this.roster = [\n      { id:'mei', name:'Mei Tanaka', addr:'mei@wave.yourteam.dev', init:'M', color:'#2DD4BF', tc:'#063' },\n      { id:'kenji', name:'Kenji Sato', addr:'kenji@wave.yourteam.dev', init:'K', color:'#818CF8', tc:'#fff' },\n      { id:'sol', name:'Sol Marín', addr:'sol@lab.partner.dev', init:'S', color:'#38BDF8', tc:'#053' },\n      { id:'priya', name:'Priya Rao', addr:'priya@research.net', init:'P', color:'#F0A741', tc:'#4a2f05' },\n    ];\n    this.spaces = [\n      { id:'launch-strategy', name:'#launch-strategy', dot:'#2E6BF0' },\n      { id:'design', name:'#design', dot:'#818CF8' },\n      { id:'i18n', name:'#i18n', dot:'#2DD4BF' },\n      { id:'community', name:'#community', dot:'#38BDF8' },\n      { id:'general', name:'#general', dot:'#7688A0' },\n    ];\n  }\n  lerp(a,b,t){ return a+(b-a)*t; }\n  buildWave(){\n    const cols=8, x0=8, x1=92, thick=22, amp=13, midY=54, phase=-0.7;\n    const topAt = x => midY - thick/2 + amp*Math.sin((x-x0)/(x1-x0)*Math.PI*2 + phase);\n    const xs=[]; for(let i=0;i<=cols;i++) xs.push(this.lerp(x0,x1,i/cols));\n    const top = xs.map(x=>[x,topAt(x)]); const bot = xs.map(x=>[x,topAt(x)+thick]);\n    const edges=[];\n    for(let i=0;i<cols;i++){ edges.push([top[i],top[i+1]]); edges.push([bot[i],bot[i+1]]); edges.push([top[i+1],bot[i]]); }\n    for(let i=0;i<=cols;i++) edges.push([top[i],bot[i]]);\n    const nodes = top.concat(bot).map(p=>({ x:p[0], y:p[1], t:(p[0]-x0)/(x1-x0) }));\n    return { edges, nodes };\n  }\n  stopColor(t){\n    const stops=[[45,212,191],[56,189,248],[46,107,240],[129,140,245]];\n    t=Math.max(0,Math.min(1,t));\n    const seg=Math.min(Math.floor(t*(stops.length-1)),stops.length-2);\n    const lt=t*(stops.length-1)-seg; const a=stops[seg], b=stops[seg+1];\n    return 'rgb('+Math.round(this.lerp(a[0],b[0],lt))+','+Math.round(this.lerp(a[1],b[1],lt))+','+Math.round(this.lerp(a[2],b[2],lt))+')';\n  }\n  renderMark(){\n    const gid = 'pwn'+(this._gid++); const kids = [];\n    kids.push(React.createElement('defs',{key:'d'},\n      React.createElement('linearGradient',{id:gid,x1:'0',y1:'0',x2:'1',y2:'0'},\n        React.createElement('stop',{key:0,offset:'0%',stopColor:'#2DD4BF'}),\n        React.createElement('stop',{key:1,offset:'40%',stopColor:'#38BDF8'}),\n        React.createElement('stop',{key:2,offset:'72%',stopColor:'#2E6BF0'}),\n        React.createElement('stop',{key:3,offset:'100%',stopColor:'#818CF8'})\n      )));\n    this.geo.edges.forEach((e,i)=>kids.push(React.createElement('line',{key:'e'+i,x1:e[0][0],y1:e[0][1],x2:e[1][0],y2:e[1][1],stroke:'url(#'+gid+')',strokeWidth:1.4,strokeLinecap:'round',opacity:0.92})));\n    this.geo.nodes.forEach((n,i)=>kids.push(React.createElement('circle',{key:'n'+i,cx:n.x,cy:n.y,r:2.4,fill:this.stopColor(n.t)})));\n    return React.createElement('svg',{viewBox:'0 0 100 100',width:'100%',height:'100%',style:{display:'block',overflow:'visible'}},kids);\n  }\n  addedList(){ return this.roster.filter(p=>this.state.added[p.id]); }\n  renderVals(){\n    const accent = this.props.accent || '#2E6BF0';\n    const step = this.state.step;\n    const stepMeta = [\n      { num:'1', label:'Name' }, { num:'2', label:'People' }, { num:'3', label:'Translate' }\n    ].map((s,i)=>{\n      const active = i===step, done = i<step;\n      return { num: done ? '✓' : s.num, label:s.label,\n        bg: active ? accent : (done ? '#E6F7F4' : '#fff'),\n        fg: active ? '#fff' : (done ? '#0f766e' : '#a9b7c8'),\n        border: active ? accent : (done ? '#bfeae0' : '#E2E9F0'),\n        labelFg: (active||done) ? '#1B3145' : '#a9b7c8' };\n    });\n    const space = this.spaces.find(s=>s.id===this.state.space) || this.spaces[0];\n    const spaceOptions = this.spaces.map(s=>{\n      const sel = s.id===this.state.space;\n      return { name:s.name, dot:s.dot, select:()=>this.setState({space:s.id}),\n        fg: sel ? '#fff' : '#46586B', bg: sel ? accent : '#F6F9FD', border: sel ? accent : '#E7EEF6' };\n    });\n    const people = this.roster.map(p=>{\n      const on = !!this.state.added[p.id];\n      return Object.assign({}, p, {\n        toggle:()=>this.setState(st=>({ added: Object.assign({}, st.added, { [p.id]: !st.added[p.id] }) })),\n        rowBg: on ? '#EEF4FF' : '#fff', rowBorder: on ? '#D6E4FB' : '#EAF0F7',\n        checkBg: on ? accent : '#fff', checkBorder: on ? accent : '#cfdae6',\n        check: on ? React.createElement('svg',{width:11,height:11,viewBox:'0 0 12 12'},React.createElement('polyline',{points:'2,6.5 5,9 10,3',fill:'none',stroke:'#fff',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'})) : '' });\n    });\n    const addedAvatars = this.addedList();\n    const youAv = { init:'Y', color:'#2E6BF0', tc:'#fff' };\n    const previewAvatars = [youAv].concat(addedAvatars.map(p=>({ init:p.init, color:p.color, tc:p.tc }))).map((a,i)=>Object.assign({},a,{ ml: i===0?'0':'-9px' }));\n    const count = 1 + addedAvatars.length;\n\n    const labels = ['Continue','Continue','Create wave','Open wave'];\n    const doAdvance = ()=>this.setState(s=>({ step: Math.min(3, s.step+1) }));\n\n    return {\n      accent,\n      navMark: this.renderMark(),\n      steps: stepMeta,\n      isStep0: step===0, isStep1: step===1, isStep2: step===2, isDone: step===3,\n      waveName: this.state.waveName,\n      onName: (e)=>this.setState({ waveName: e.target.value }),\n      spaceOptions,\n      people,\n      onAddKey: (e)=>{ if(e.key==='Enter' && e.target.value.trim()){ const v=e.target.value.trim(); const id='x'+Date.now(); this.roster.push({ id, name:v.split('@')[0], addr:v, init:v[0].toUpperCase(), color:'#38BDF8', tc:'#053' }); this.setState(st=>({ added: Object.assign({}, st.added, { [id]:true }) })); e.target.value=''; } },\n      translate: this.state.translate,\n      toggleTranslate: ()=>this.setState(s=>({ translate:!s.translate })),\n      toggleBg: this.state.translate ? accent : '#D3DEEC',\n      toggleX: this.state.translate ? '22px' : '2px',\n      translateCardBg: this.state.translate ? '#EEF4FF' : '#F6F9FD',\n      translateCardBorder: this.state.translate ? '#D6E4FB' : '#EAF0F7',\n      next: doAdvance,\n      nextLabel: labels[step],\n      back: ()=>this.setState(s=>({ step: Math.max(0, s.step-1) })),\n      backColor: step===0 ? '#cfdae6' : '#46586B',\n      backCursor: step===0 ? 'default' : 'pointer',\n      previewSpace: space.name,\n      previewDot: space.dot,\n      previewTitle: this.state.waveName || 'Untitled wave',\n      previewAvatars,\n      previewCount: count===1 ? 'just you' : (count + ' participants'),\n      previewCaption: this.state.waveName ? 'This is how your wave will appear.' : 'Start typing a title to see it here.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
