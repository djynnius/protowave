// ProtoWave server-to-server federation protocol, v0 (PRD §8.3,
// docs/federation-spec.md).
//
// Transport (v0): HTTP POST on the peer's public URL with a binary-encoded
// message body. Authentication is message-level, not transport-level: the
// sender's domain travels in the `X-ProtoWave-Domain` header and an ed25519
// signature over `"protowave-fed-v0" ‖ path ‖ body` in
// `X-ProtoWave-Signature` (hex). Receivers resolve and pin the sender's key
// via GET /.well-known/protowave on first contact (TOFU). The message
// schema is transport-agnostic; a gRPC transport can carry the same
// messages later.

syntax = "proto3";

package protowave.v1;

// GET /.well-known/protowave (unauthenticated, JSON mirror also served).
message ServerInfo {
  string domain = 1;
  // Base URL peers should call, e.g. "http://10.0.0.5:80".
  string public_url = 2;
  // ed25519 public key, 32 bytes.
  bytes public_key = 3;
  uint32 protocol_version = 4;
}

// POST /federation/v0/push — one locally-originated update, fanned out to
// every peer domain on the wavelet's wave (content plane, FR-48..49).
message UpdateBatch {
  string wavelet = 1;
  bytes update = 2;
  // ACL version the sender held when authoring (removed-participant rule).
  uint64 acl_version = 3;
}

// POST /federation/v0/sync — anti-entropy (FR-50). Request carries the
// caller's state vector; the response returns the missing diff and the
// responder's state vector so the caller can push back in turn.
message FedSyncRequest {
  string wavelet = 1;
  bytes state_vector = 2;
}

message FedSyncResponse {
  bytes state_vector = 1;
  bytes diff = 2;
}

// POST /federation/v0/announce — control plane (FR-51): the wave's home
// server distributes the authoritative participant list. Only accepted
// when the sender IS the wave's home domain.
message WaveAnnouncement {
  string wave = 1;
  string title = 2;
  repeated string participants = 3;
  string created_by = 4;
  uint64 created_ms = 5;
  uint64 acl_version = 6;
  // Wave-level translation opt-in (FR-40) — replicated so every server
  // enforces it for its own viewers.
  bool translation_enabled = 7;
}

message FedAck {
  bool ok = 1;
  string error = 2;
}

// ---- distributed folder sharing (PRD §11, FR-54..59) ----

// A shared folder: content-defined chunks (FastCDC) in the BLAKE3 CAS.
// The manifest itself is stored in the CAS; its hash is the share id and
// the read capability (NFR-18) — fetch-by-hash is self-verifying.
message FolderManifest {
  string name = 1;
  repeated FileEntry files = 2;
  uint64 total_size = 3;
  uint64 created_ms = 4;
}

message FileEntry {
  // Relative path within the folder, '/'-separated.
  string path = 1;
  uint64 size = 2;
  string mime = 3;
  // BLAKE3 hex of each chunk, in order.
  repeated string chunks = 4;
}

// POST /federation/v0/share-announce — origin server tells wave peers a
// share exists so it appears in their members' file panels (FR-55).
message ShareAnnouncement {
  string wave = 1;
  string manifest_hash = 2;
  string name = 3;
  uint64 total_size = 4;
  uint32 file_count = 5;
  string uploader = 6;
  uint64 created_ms = 7;
}

// POST /federation/v0/blob — fetch a CAS blob (chunk or manifest) by hash.
// The response body is the raw bytes; the requester verifies BLAKE3 before
// accepting (FR-56, NFR-C9). `wave` scopes the ACL check.
message BlobRequest {
  string hash = 1;
  string wave = 2;
}

// ---- federated inference (PRD §12.1, Hive Mind — exploratory) ----
//
// POST /federation/v0/infer — a peer server asks THIS server's model to
// answer, scoped to a wave the requesting domain participates in (FI-4/5).
// "Mixture of peers": a wave's agent can route to whichever node hosts a
// suitable model. Answers are advisory; verification (R11) is unsolved —
// callers may cross-check with redundant samples.
message InferRequest {
  string wave = 1;
  string prompt = 2;
  string context = 3;
  // Optional: a specific model id advertised in the responder's
  // .well-known capability list (FI-1). Empty = the responder's node
  // default. Lets a router target one node's particular model.
  string model = 4;
}

message InferResponse {
  string text = 1;
  // The responding server's advertised model id (provenance, FI-1).
  string model = 2;
}
