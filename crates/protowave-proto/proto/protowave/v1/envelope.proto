// ProtoWave client-server wire protocol, v1 (PRD §8.1).
//
// One WebSocket per client session carries binary-encoded Envelope frames,
// multiplexing the logical channels below. CRDT payloads on the SYNC channel
// are opaque yrs/Yjs (lib0) binary — never re-encoded.
//
// This file is the canonical schema: the Rust types are generated from it at
// build time (protox + prost), and the web client parses it at runtime
// (protobufjs). Keep it self-contained.

syntax = "proto3";

package protowave.v1;

// Logical channels multiplexed over one WebSocket.
enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  // Session control: subscribe/unsubscribe, errors.
  CHANNEL_CONTROL = 1;
  // CRDT document sync (SyncMessage).
  CHANNEL_SYNC = 2;
  // Ephemeral presence/cursors (AwarenessMessage; payload is
  // y-protocols/awareness binary, relayed opaquely).
  CHANNEL_AWARENESS = 3;
  // Translation overlay patches. Phase 4.
  CHANNEL_TRANSLATION = 4;
  // Server-initiated notifications. Phase 2.
  CHANNEL_NOTIFICATION = 5;
  // Phase 0 scaffolding; retained for protocol smoke tests.
  CHANNEL_ECHO = 6;
}

message Envelope {
  Channel channel = 1;
  bytes payload = 2;
}

// ---- CHANNEL_CONTROL payloads ----
//
// The WebSocket is authenticated at upgrade time via the HTTP session cookie
// (REST /api/login), so there is no in-band auth handshake anymore.

message ControlMessage {
  oneof kind {
    Subscribe subscribe = 1;
    Unsubscribe unsubscribe = 2;
    Subscribed subscribed = 3;
    ControlError error = 4;
  }
}

// Client → server: open a wavelet. state_vector is the client's current yrs
// state vector (empty for a fresh client).
message Subscribe {
  string wavelet = 1; // WaveletName serialized form: domain/wave-id/wavelet-id
  bytes state_vector = 2;
}

message Unsubscribe {
  string wavelet = 1;
}

// Server → client: subscription accepted. Immediately followed on
// CHANNEL_SYNC by a SyncState carrying the diff the client is missing.
message Subscribed {
  string wavelet = 1;
}

message ControlError {
  string wavelet = 1; // empty when not wavelet-scoped
  string code = 2;    // e.g. "not-participant", "not-found", "bad-request"
  string message = 3;
}

// ---- CHANNEL_SYNC payloads ----

message SyncMessage {
  string wavelet = 1;
  oneof kind {
    // Server → client, right after Subscribed: server's state vector plus
    // the update diff covering what the client's state vector was missing.
    // The client applies `diff`, then computes its own diff against
    // `state_vector` and sends it back as an Update (reconnect convergence,
    // NFR-21).
    SyncState sync_state = 2;
    // Either direction: an incremental yrs update to apply.
    Update update = 3;
  }
}

message SyncState {
  bytes state_vector = 1;
  bytes diff = 2;
}

message Update {
  bytes update = 1;
}

// ---- CHANNEL_AWARENESS payloads ----

// Relayed opaquely between subscribers of a wavelet; `payload` is
// y-protocols/awareness encoded binary. The server caches the latest payload
// per session and replays the cache to new subscribers (FR-22..23).
message AwarenessMessage {
  string wavelet = 1;
  bytes payload = 2;
}
